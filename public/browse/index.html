  <title>Browse PriceCheck</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/browse/styles.css">
  <link rel="icon" type="image/svg+xml" href="/logo/logo.svg">
  <link rel="stylesheet" href="/styles.css">
  <script src="/search.js" defer></script>

    <body class="browse-page">
    <div class="page">
    <div id="site-header"></div>

    <nav id="browseRail" class="browse-rail" aria-label="Browse navigation"></nav>

        <main class="wrap">
            <div class="layout">
                <div class="maincol">
                <div id="conditionFilter" hidden></div>
                <div class="muted" id="meta"></div>
                <div id="emptyInline" class="empty-inline" hidden></div>

                <section class="grid" id="grid"></section>
                </div>

                <aside class="sidecol" id="sidecol" hidden>
                <div id="sideSpecsPromo" class="side-specs-promo" hidden></div>
                <section class="card sidecard" id="categoryPanel" hidden></section>
                <section class="card sidecard" id="brandPanel"></section>
                <section class="card sidecard" id="familyPanel" hidden></section>
                </aside>
            </div>
        </main>

        <aside id="shortlistRail" class="shortlist-rail" hidden aria-label="Shortlist">
            <div id="shortlistMini" class="shortlist-mini"></div>
        </aside>

        <div id="site-footer"></div>
    </div>

</body>
</html>
